<script>
    const getData = () => {

        return new Promise((resolve) => {

            setTimeout(() => {

                resolve("Sudhan");

            }, 2000);
        });
    };

    getData().then((data) => {

        console.log(data);
    });

    // Task 1

    const getStudent = () => {

        return new Promise((resolve) => {

            setTimeout(() => {

                resolve("Sudhan");

            }, 2000);
        });
    };

    getStudent()
        .then((student) => {

            console.log(student);
        });

    // Task 2

    const getEmployee = () => {

        return new Promise((resolve) => {

            setTimeout(() => {

                resolve({

                    id: 1,
                    name: "Sudhan",
                    role: "Trainer"

                });

            }, 3000);
        });
    };

    getEmployee()
        .then((employee) => {

            console.log(employee);
        });

    // Task 3

    const login = () => {

        return new Promise((resolve) => {

            setTimeout(() => {

                resolve("Login Success");

            }, 2000);
        });
    };

    login()
        .then((message) => {

            console.log(message);
        });

    // Task 4

    const getProducts = () => {

        return new Promise((resolve) => {

            setTimeout(() => {

                resolve([
                    "Laptop",
                    "Mobile",
                    "Keyboard"
                ]);

            }, 2000);
        });
    };

    getProducts()
        .then((products) => {

            console.log(products);
        });

    // Task 5

    const orderFood = () => {

        return new Promise((resolve) => {

            setTimeout(() => {

                resolve("Pizza Delivered");

            }, 4000);
        });
    };

    orderFood()
        .then((message) => {

            console.log(message);
        });

    // Task 6

    const getUser = () => {

        return Promise.resolve("User Loaded");
    };

    const getOrders = () => {

        return Promise.resolve("Orders Loaded");
    };

    const getPayments = () => {

        return Promise.resolve("Payments Loaded");
    };

    getUser()

        .then((user) => {

            console.log(user);

            return getOrders();
        })

        .then((orders) => {

            console.log(orders);

            return getPayments();
        })

        .then((payments) => {

            console.log(payments);

            console.log("Completed");
        });

    // Task 7

    const payment = () => {

        return new Promise((resolve, reject) => {

            const status = false;

            if (status) {

                resolve("Payment Success");

            } else {

                reject("Payment Failed");
            }
        });
    };

    payment()

        .then((message) => {

            console.log(message);
        })

        .catch((error) => {

            console.log(error);
        });
</script>
